<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You 💜</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #05010a;
            background-image: radial-gradient(circle at 50% 50%, #1a0933 0%, #05010a 100%);
            color: #ffffff;
            font-family: 'Baloo 2', sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .stars-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: 
                radial-gradient(circle at 15% 15%, #fff 1px, transparent 1px),
                radial-gradient(circle at 85% 30%, #fff 1px, transparent 1px),
                radial-gradient(circle at 50% 80%, #fff 1.5px, transparent 1.5px),
                radial-gradient(circle at 30% 60%, rgba(255, 255, 255, 0.4) 1px, transparent 1px);
            background-size: 250px 250px;
            opacity: 0.35;
            z-index: 1;
        }

        .header-container {
            position: absolute;
            top: 40px;
            left: 40px;
            text-align: left;
            z-index: 10;
        }

        .title {
            font-family: 'Baloo 2', sans-serif;
            font-weight: 800;
            font-size: 3.5rem;
            color: #ffffff;
            margin: 0;
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #ff2a85,
                0 0 20px #ff2a85,
                0 0 40px #ff2a85;
        }

        .subtitle {
            font-family: 'Baloo 2', sans-serif;
            font-weight: 500;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 5px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="stars-overlay"></div>

    <div class="header-container">
        <h1 class="title">for you 💜</h1>
        <p class="subtitle">click to open what's inside</p>
    </div>

</body>
</html>
