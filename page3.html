<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>One Last Surprise</title>

    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

</head>


<body class="page3-body">


<div class="page3">


    <div class="page3-background">

        <div class="page3-stars"></div>

        <div class="page3-city"></div>

    </div>



    <div class="page3-web page3-web-left"></div>

    <div class="page3-web page3-web-right"></div>




    <header class="page3-header">

        <h1>
            One Last Surprise
        </h1>

        <p>
            Click to see what's inside ♡

    </header>





    <div class="page3-porsche">

        <img src="Porsche final.png" alt="Custom Porsche">

    </div>






    <section class="page3-envelope-container">


        <article class="page3-envelope" data-memory="1">

            <div class="envelope-body">

                <div class="envelope-flap"></div>

                <div class="porsche-badge"></div>

                <div class="hello-kitty-bow"></div>

                <div class="wax-seal">
                    ♥
                </div>

            </div>

        </article>




        <article class="page3-envelope" data-memory="2">

            <div class="envelope-body">

                <div class="envelope-flap"></div>

                <div class="porsche-badge"></div>

                <div class="hello-kitty-bow"></div>

                <div class="wax-seal">
                    ♥
                </div>

            </div>

        </article>




        <article class="page3-envelope" data-memory="3">

            <div class="envelope-body">

                <div class="envelope-flap"></div>

                <div class="porsche-badge"></div>

                <div class="hello-kitty-bow"></div>

                <div class="wax-seal">
                    ♥
                </div>

            </div>

        </article>





        <article class="page3-envelope" data-memory="4">

            <div class="envelope-body">

                <div class="envelope-flap"></div>

                <div class="porsche-badge"></div>

                <div class="hello-kitty-bow"></div>

                <div class="wax-seal">
                    ♥
                </div>

            </div>

        </article>



    </section>






    <section class="memory-screen">


        <div class="polaroid">

            <img src="" alt="Memory photo">

        </div>



        <div class="music-player">

        </div>



        <div class="letter">

            <h2>
                To my favorite person ♡
            </h2>

            <p></p>

        </div>



        <button class="close-memory">
            ♡ Click to go back ♡
        </button>


    </section>



</div>



<script src="js/script.js"></script>


</body>

</html>
